<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nosso Dia</title>

    <link rel="stylesheet" href="../style.css" />
    <style>
      :root {
        --bg-gradient: radial-gradient(
          circle at 20% 20%,
          #82b5e5 0%,
          #2f63b8 34%,
          #132d75 72%,
          #081737 100%
        );
        --hero-blur: 0px;
        --hero-opacity: 1;
        --hero-shift: 0px;
        --hero-scale: 1;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg-gradient);
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        overflow-x: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #ffffff;
        background: var(--bg-gradient);
      }

      #moon-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        pointer-events: none;
        z-index: 9999;
      }

      .page-shell {
        position: relative;
        z-index: 1;
      }

      .hero {
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(20px, 4vw, 56px);
      }

      .hero-inner {
        width: min(100%, 980px);
        display: grid;
        gap: clamp(16px, 2.5vh, 26px);
        justify-items: center;
      }

      .hero-eyebrow {
        margin: 0;
        font-size: 0.9rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
      }

      .hero-title {
        margin: 0;
        text-align: center;
        font-size: clamp(2.2rem, 7.5vw, 5rem);
        line-height: 1.08;
        letter-spacing: 0.02em;
        text-wrap: balance;
        text-shadow:
          0 12px 26px rgba(6, 20, 68, 0.45),
          0 2px 12px rgba(255, 255, 255, 0.35);
        filter: blur(var(--hero-blur));
        opacity: var(--hero-opacity);
        transform: translate3d(0, var(--hero-shift), 0) scale(var(--hero-scale));
        transform-origin: center;
        will-change: transform, filter, opacity;
      }

      .hero-subtitle {
        margin: 0;
        text-align: center;
        color: rgba(255, 255, 255, 0.86);
        font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      }

      .scroll-hint {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(0.88rem, 2.2vw, 1rem);
        letter-spacing: 0.01em;
      }

      .scroll-hint-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
        animation: scrollHintBounce 1.2s ease-in-out infinite;
      }

      @keyframes scrollHintBounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.9;
        }
        50% {
          transform: translateY(4px);
          opacity: 1;
        }
      }

      .outro-title {
        filter: none;
        opacity: 1;
        transform: none;
      }

      .apple-player {
        margin-top: 4px;
        width: min(94vw, 460px);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px;
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.34),
          rgba(255, 255, 255, 0.12)
        );
        box-shadow:
          0 24px 40px rgba(6, 20, 68, 0.35),
          inset 0 1px 1px rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .apple-cover-wrap {
        width: 92px;
        height: 92px;
        border-radius: 20px;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 10px 24px rgba(6, 20, 68, 0.38);
      }

      .apple-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .apple-track-area {
        min-width: 0;
        flex: 1;
      }

      .apple-track-title {
        color: #fff;
        font-size: 1.02em;
        font-weight: 700;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .apple-track-artist {
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.88em;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

      .apple-seek {
        width: 100%;
        margin-top: 10px;
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        outline: none;
      }

      .apple-seek::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(6, 20, 68, 0.45);
        border: none;
      }

      .apple-seek::-moz-range-thumb {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(6, 20, 68, 0.45);
        border: none;
      }

      .apple-time {
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.76em;
      }

      .apple-controls {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        gap: 12px;
      }

      .apple-btn {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.23);
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        transition:
          transform 0.16s ease,
          background 0.2s ease;
      }

      .apple-btn:hover {
        background: rgba(255, 255, 255, 0.33);
      }

      .apple-btn:active {
        transform: scale(0.96);
      }

      .apple-icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .apple-btn-main {
        width: 44px;
        height: 44px;
        background: #fff;
        color: #193994;
        font-size: 15px;
        box-shadow: 0 8px 18px rgba(6, 20, 68, 0.32);
      }

      .apple-btn-main:hover {
        background: #f6f7ff;
      }

      .memories-wrap {
        padding: 0;
      }

      .memories-scroll {
        --cards-count: 11;
        position: relative;
        height: calc(var(--cards-count) * 100vh);
        height: calc(var(--cards-count) * 100svh);
        height: calc(var(--cards-count) * 100dvh);
      }

      .memories-stage {
        position: sticky;
        top: 0;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(14px, 3vw, 30px);
      }

      .memories {
        position: relative;
        width: min(100%, 1080px);
        height: min(78vh, 720px);
      }

      .memory-card {
        position: absolute;
        inset: 0;
        margin: auto;
        width: min(100%, 980px);
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(180px, 270px);
        align-items: center;
        gap: clamp(14px, 2.5vw, 24px);
        padding: clamp(14px, 2.8vw, 24px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: linear-gradient(
          140deg,
          rgba(255, 255, 255, 0.36),
          rgba(255, 255, 255, 0.12)
        );
        box-shadow:
          0 24px 46px rgba(6, 20, 68, 0.32),
          inset 0 1px 1px rgba(255, 255, 255, 0.46);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        transform: translate3d(0, 64px, 0) scale(0.94);
        filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity, filter;
      }

      .memory-card.is-active {
        pointer-events: auto;
      }

      .memory-card.is-active:hover {
        box-shadow:
          0 30px 55px rgba(6, 20, 68, 0.4),
          inset 0 1px 1px rgba(255, 255, 255, 0.55);
      }

      .memory-card.reverse {
        grid-template-columns: minmax(180px, 270px) minmax(0, 1fr);
      }

      .memory-text {
        display: grid;
        gap: 10px;
      }

      .memory-index {
        font-size: 0.74rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
      }

      .memory-phrase {
        margin: 0;
        font-size: clamp(1rem, 2.5vw, 1.45rem);
        line-height: 1.5;
        color: #ffffff;
        text-shadow: 0 4px 16px rgba(10, 28, 78, 0.44);
      }

      .memory-media {
        margin: 0;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 14px 28px rgba(6, 20, 68, 0.3);
      }

      .memory-photo {
        width: 100%;
        max-height: min(58vh, 530px);
        aspect-ratio: 4 / 5;
        object-fit: cover;
        display: block;
      }

      @media (max-width: 760px) {
        .hero {
          padding: 20px 12px 16px;
          align-items: flex-start;
        }

        .hero-inner {
          margin-top: 24px;
        }

        .apple-player {
          width: min(94vw, 420px);
          padding: 12px;
          gap: 10px;
          border-radius: 22px;
        }

        .apple-cover-wrap {
          width: 74px;
          height: 74px;
          border-radius: 16px;
        }

        .apple-btn {
          width: 34px;
          height: 34px;
        }

        .apple-btn-main {
          width: 40px;
          height: 40px;
        }

        .memories-scroll {
          height: calc(var(--cards-count) * 88vh);
          height: calc(var(--cards-count) * 88svh);
          height: calc(var(--cards-count) * 88dvh);
        }

        .memories-stage {
          padding: 12px;
        }

        .memories {
          height: min(76vh, 640px);
        }

        .memory-card,
        .memory-card.reverse {
          width: 100%;
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .memory-media {
          order: -1;
        }

        .memory-photo {
          max-height: 42vh;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="moon-canvas"></canvas>
    <audio id="romantic-audio" preload="metadata"></audio>

    <div class="page-shell">
      <header id="hero" class="hero">
        <div class="hero-inner">
          <p class="hero-eyebrow">Dedico à Yasmin esta homenagem</p>
          <h1 id="hero-title" class="hero-title">
            In my restless dreams, I see you.
          </h1>
          <p class="hero-subtitle">
            Cada passo com você virou a melhor parte da minha historia.
          </p>

          <div class="apple-player" aria-label="Player de musica">
            <div class="apple-cover-wrap">
              <img
                src="../assets/love.jpeg"
                alt="Capa do player"
                class="apple-cover"
              />
            </div>
            <div class="apple-track-area">
              <div id="player-track-title" class="apple-track-title">
                Lua Cheia
              </div>
              <div id="player-track-artist" class="apple-track-artist">
                Marina Sena
              </div>
              <input
                id="player-seek"
                class="apple-seek"
                type="range"
                min="0"
                max="1000"
                value="0"
                step="1"
                aria-label="Progresso da musica"
              />
              <div class="apple-time">
                <span id="player-current-time">0:00</span>
                <span id="player-duration">0:00</span>
              </div>
              <div class="apple-controls">
                <button
                  id="player-prev"
                  type="button"
                  class="apple-btn"
                  aria-label="Voltar musica"
                >
                  <svg
                    class="apple-icon"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path d="M14.5 6.5 8.5 12l6 5.5" />
                    <path d="M7 6.5v11" />
                  </svg>
                </button>
                <button
                  id="player-toggle"
                  type="button"
                  class="apple-btn apple-btn-main"
                  aria-label="Play"
                >
                  &#9654;
                </button>
                <button
                  id="player-next"
                  type="button"
                  class="apple-btn"
                  aria-label="Avancar musica"
                >
                  <svg
                    class="apple-icon"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path d="m9.5 6.5 6 5.5-6 5.5" />
                    <path d="M17 6.5v11" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <p class="hero-subtitle">
            Só hoje, já pensei em você <span id="epoch-counter">0</span> vezes.
          </p>
          <p class="scroll-hint">
            <span class="scroll-hint-icon" aria-hidden="true">↓</span>
            <span>desce que tem mais</span>
          </p>
        </div>
      </header>

      <main class="memories-wrap">
        <section
          id="memories-scroll"
          class="memories-scroll"
          aria-label="Paineis com frases e fotos"
        >
          <div class="memories-stage">
            <section id="memories" class="memories"></section>
          </div>
        </section>
      </main>

      <section class="hero" aria-label="Mensagem final">
        <div class="hero-inner">
          <p class="hero-eyebrow">Yasmin</p>
          <h2 class="hero-title outro-title">Eu te amo</h2>
        </div>
      </section>
    </div>

    <script>
      const memoryPhrases = [
        '01/01/2026 não foi só o ano que havia começado, mas também a nossa jornada juntos. E com uma simples mensagem, hoje amo a mulher mais linda e inteligente desse mundo.',
        'Me apaixono por você todos os dias, como se fosse da primeira vez. Cada momento ao seu lado é como se fosse um novo capítulo de um livro que eu nunca quero que acabe.',
        'Acho incrível como nossas histórias se entrelaçaram de uma forma tão perfeita, como se o universo tivesse conspirado para nos unir.',
        'Você me proporcionou momentos tão incríveis que eu nem sabia que eram possíveis.',
        '13/06/2026 ficou marcado pela melhor escolha que pude fazer, ao me jogar de peito aberto para você, e isso me trouxe a maior felicidade que eu poderia imaginar.',
        'Você é a única pessoa que consegue me acalmar durante esse completo caos que pode ser a vida, todos os problemas parecem sumir quando estou contigo.',
        'Por conta de ti, consumi livros, jogos, filmes e músicas que nunca imaginei que faria questão de conhecer, e isso só me fez te amar mais, porque cada pedacinho do que eu sou hoje tem um pouco de você.',
        'Obrigado por ser minha melhor amiga, minha confidente, minha parceira e a pessoa que me entende como ninguém mais. Com você, eu posso ser completamente eu mesmo.',
      ];

      function renderMemoryCards() {
        const container = document.getElementById('memories');
        if (!container) return;

        memoryPhrases.forEach((phrase, index) => {
          const card = document.createElement('article');
          card.className = 'memory-card';
          if ((index + 1) % 2 === 0) {
            card.classList.add('reverse');
          }

          const textWrap = document.createElement('div');
          textWrap.className = 'memory-text';

          const cardIndex = document.createElement('span');
          cardIndex.className = 'memory-index';
          cardIndex.textContent = `Momento ${String(index + 1).padStart(2, '0')}`;

          const cardPhrase = document.createElement('p');
          cardPhrase.className = 'memory-phrase';
          cardPhrase.textContent = phrase;

          textWrap.append(cardIndex, cardPhrase);

          const media = document.createElement('figure');
          media.className = 'memory-media';

          const img = document.createElement('img');
          img.className = 'memory-photo';
          img.src = `../assets/nos/${index + 1}.jpeg`;
          img.alt = `Foto ${index + 1} de nos dois`;
          img.loading = 'lazy';

          media.appendChild(img);

          if (card.classList.contains('reverse')) {
            card.append(media, textWrap);
          } else {
            card.append(textWrap, media);
          }

          container.appendChild(card);
        });
      }

      function initEpochCounter() {
        const counter = document.getElementById('epoch-counter');
        if (!counter) return;

        function updateCounter() {
          counter.textContent = String(Math.floor(Date.now() / 1000));
        }

        updateCounter();
        setInterval(updateCounter, 1000);
      }

      function setupScrollEffects() {
        const hero = document.getElementById('hero');
        const memoriesScroll = document.getElementById('memories-scroll');
        const cards = Array.from(document.querySelectorAll('.memory-card'));
        if (!hero || !memoriesScroll || cards.length === 0) return;

        memoriesScroll.style.setProperty('--cards-count', String(cards.length));

        function mapProgressToCardTimeline(rawProgress, cardsCount) {
          if (cardsCount <= 1) return 0;

          // Segura mais tempo cada card em foco e faz a transicao em menos scroll.
          const holdWeight = 1.8;
          const transitionWeight = 0.9;
          const totalUnits =
            cardsCount * holdWeight + (cardsCount - 1) * transitionWeight;
          const cursor = Math.min(
            totalUnits,
            Math.max(0, rawProgress * totalUnits),
          );

          let elapsed = 0;
          for (let index = 0; index < cardsCount; index += 1) {
            const holdEnd = elapsed + holdWeight;
            if (cursor <= holdEnd || index === cardsCount - 1) {
              return index;
            }

            elapsed = holdEnd;
            const transitionEnd = elapsed + transitionWeight;
            if (cursor <= transitionEnd) {
              const transitionProgress = (cursor - elapsed) / transitionWeight;
              return index + transitionProgress;
            }
            elapsed = transitionEnd;
          }

          return cardsCount - 1;
        }

        let animationFrameId = 0;

        function update() {
          animationFrameId = 0;

          const scrollY = window.scrollY || window.pageYOffset;
          const heroHeight = hero.offsetHeight || window.innerHeight;
          const heroProgress = Math.min(
            1,
            Math.max(0, scrollY / (heroHeight * 0.9)),
          );

          document.documentElement.style.setProperty(
            '--hero-blur',
            `${(heroProgress * 14).toFixed(2)}px`,
          );
          document.documentElement.style.setProperty(
            '--hero-opacity',
            String((1 - heroProgress * 0.9).toFixed(3)),
          );
          document.documentElement.style.setProperty(
            '--hero-shift',
            `${(heroProgress * -44).toFixed(2)}px`,
          );
          document.documentElement.style.setProperty(
            '--hero-scale',
            String((1 - heroProgress * 0.05).toFixed(3)),
          );

          const trackTop = memoriesScroll.getBoundingClientRect().top;
          const scrollable = Math.max(
            1,
            memoriesScroll.offsetHeight - window.innerHeight,
          );
          const rawProgress = Math.min(1, Math.max(0, -trackTop / scrollable));
          const activeFloat = mapProgressToCardTimeline(
            rawProgress,
            cards.length,
          );

          cards.forEach((card, index) => {
            const delta = index - activeFloat;
            const distance = Math.abs(delta);
            const opacity = Math.max(0, 1 - distance * 1.15);
            const translateY = delta * 62;
            const scale = Math.max(0.88, 1 - distance * 0.07);
            const blur = Math.min(10, distance * 10);

            card.style.opacity = opacity.toFixed(3);
            card.style.transform = `translate3d(0, ${translateY.toFixed(
              2,
            )}px, 0) scale(${scale.toFixed(3)})`;
            card.style.filter = `blur(${blur.toFixed(2)}px)`;
            card.classList.toggle('is-active', distance < 0.6);
          });
        }

        function requestUpdate() {
          if (animationFrameId) return;
          animationFrameId = requestAnimationFrame(update);
        }

        window.addEventListener('scroll', requestUpdate, { passive: true });
        window.addEventListener('resize', requestUpdate);
        requestUpdate();
      }

      function formatMusicTime(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
        const totalSeconds = Math.floor(seconds);
        const minutes = Math.floor(totalSeconds / 60);
        const remainingSeconds = String(totalSeconds % 60).padStart(2, '0');
        return `${minutes}:${remainingSeconds}`;
      }

      function initRomanticPlayer() {
        const audio = document.getElementById('romantic-audio');
        const prevButton = document.getElementById('player-prev');
        const toggleButton = document.getElementById('player-toggle');
        const nextButton = document.getElementById('player-next');
        const seek = document.getElementById('player-seek');
        const title = document.getElementById('player-track-title');
        const artist = document.getElementById('player-track-artist');
        const currentTime = document.getElementById('player-current-time');
        const duration = document.getElementById('player-duration');

        if (
          !audio ||
          !prevButton ||
          !toggleButton ||
          !nextButton ||
          !seek ||
          !title ||
          !artist ||
          !currentTime ||
          !duration
        ) {
          return;
        }

        const playlist = [
          {
            src: '../assets/music/00 Lua Cheia.mp3',
            title: 'Lua Cheia',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/01 Coisas Naturais.mp3',
            title: 'Coisas Naturais',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/02 Desmitificar.mp3',
            title: 'Desmitificar',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/03 Numa Ilha.mp3',
            title: 'Numa Ilha',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/04 Anjo.mp3',
            title: 'Anjo',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/05 Sem Lei.mp3',
            title: 'Sem Lei',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/06 Combo da Sorte.mp3',
            title: 'Combo da Sorte',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/07 Mágico.mp3',
            title: 'Mágico',
            artist: 'Marina Sena',
          },
        ];

        let currentTrackIndex = 0;
        let isSeeking = false;

        function updatePlayButton() {
          if (audio.paused) {
            toggleButton.textContent = '▶';
            toggleButton.setAttribute('aria-label', 'Play');
            return;
          }
          toggleButton.textContent = '❚❚';
          toggleButton.setAttribute('aria-label', 'Pausar');
        }

        function updateTrackText() {
          const track = playlist[currentTrackIndex];
          title.textContent = track.title;
          artist.textContent = track.artist;
        }

        function updateProgressUI() {
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (hasDuration && !isSeeking) {
            seek.value = String(
              Math.round((audio.currentTime / audio.duration) * 1000),
            );
          }
          currentTime.textContent = formatMusicTime(audio.currentTime);
          duration.textContent = hasDuration
            ? formatMusicTime(audio.duration)
            : '0:00';
        }

        function loadTrack(index, autoPlay = false) {
          currentTrackIndex = (index + playlist.length) % playlist.length;
          audio.src = encodeURI(playlist[currentTrackIndex].src);
          audio.load();
          seek.value = '0';
          currentTime.textContent = '0:00';
          duration.textContent = '0:00';
          updateTrackText();

          if (autoPlay) {
            audio.play().catch(() => {
              updatePlayButton();
            });
          } else {
            updatePlayButton();
          }
        }

        prevButton.addEventListener('click', () => {
          loadTrack(currentTrackIndex - 1, !audio.paused);
        });

        nextButton.addEventListener('click', () => {
          loadTrack(currentTrackIndex + 1, !audio.paused);
        });

        toggleButton.addEventListener('click', () => {
          if (audio.paused) {
            audio.play().catch(() => {
              updatePlayButton();
            });
            return;
          }
          audio.pause();
        });

        seek.addEventListener('input', () => {
          isSeeking = true;
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (!hasDuration) return;
          const nextTime = (Number(seek.value) / 1000) * audio.duration;
          currentTime.textContent = formatMusicTime(nextTime);
        });

        seek.addEventListener('change', () => {
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (hasDuration) {
            audio.currentTime = (Number(seek.value) / 1000) * audio.duration;
          }
          isSeeking = false;
        });

        audio.addEventListener('loadedmetadata', updateProgressUI);
        audio.addEventListener('timeupdate', updateProgressUI);
        audio.addEventListener('play', updatePlayButton);
        audio.addEventListener('pause', updatePlayButton);
        audio.addEventListener('ended', () => {
          loadTrack(currentTrackIndex + 1, true);
        });

        loadTrack(0);

        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            document.body.addEventListener(
              'click',
              () => {
                audio.play().catch(() => {});
              },
              { once: true },
            );
          });
        }
      }

      function iniciarChuvaDeLuas() {
        const canvas = document.getElementById('moon-canvas');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let rainMoons = [];
        const MAX_RAIN = 42;

        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createRainMoon() {
          if (rainMoons.length >= MAX_RAIN) return;
          const size = Math.random() * 18 + 12;
          rainMoons.push({
            x: Math.random() * canvas.width,
            y: -size,
            size,
            vy: Math.random() * 2.5 + 1.5,
            opacity: Math.random() * 0.5 + 0.5,
            rotation: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.04,
          });
        }

        function drawMoon(x, y, size, rotation, opacity) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rotation);
          ctx.globalAlpha = opacity;
          const outerRadius = size * 0.65;
          const centerY = size * 0.35;
          ctx.fillStyle = '#cdcf51';
          ctx.shadowColor = 'rgba(255, 251, 179, 0.9)';
          ctx.shadowBlur = 9;
          ctx.beginPath();
          ctx.arc(0, centerY, outerRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'destination-out';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(size * 0.35, centerY, outerRadius * 0.9, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
          ctx.restore();
        }

        function animateMoons() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < rainMoons.length; i += 1) {
            const moon = rainMoons[i];
            moon.y += moon.vy;
            moon.rotation += moon.spin;
            drawMoon(moon.x, moon.y, moon.size, moon.rotation, moon.opacity);
          }
          rainMoons = rainMoons.filter(
            moon => moon.y < canvas.height + moon.size,
          );
          requestAnimationFrame(animateMoons);
        }

        setInterval(createRainMoon, 120);
        animateMoons();
      }

      window.addEventListener('DOMContentLoaded', () => {
        initEpochCounter();
        renderMemoryCards();
        setupScrollEffects();
        initRomanticPlayer();
        iniciarChuvaDeLuas();
      });
    </script>
