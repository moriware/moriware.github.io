<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yasmin ❤️</title>

    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #559cdf 0%, #193994 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #719dcf;
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #contador-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100vw;
        margin-top: 0;
      }
      #contador-container h1 {
        text-align: center;
        margin-top: 40px;
      }
      #contador-container img {
        display: block;
      }
      .progress-container {
        margin: 40px 0 0 0;
        width: 90%;
        max-width: 500px;
        background: #fff;
        border-radius: 30px;
        box-shadow: 0 4px 16px rgba(182, 194, 255, 0.3);
        padding: 30px;
        text-align: center;
        align-self: center;
      }
      @media (max-width: 600px) {
        #contador-container {
          width: 100vw;
        }
        .progress-container {
          margin: 24px 0 0 0;
          padding: 16px !important;
        }
        #contador-container img {
          max-width: 120px !important;
        }
      }
      @media (max-width: 600px) {
        h1 {
          font-size: 1.5em !important;
          margin-top: 24px !important;
        }
        .progress-container {
          padding: 16px !important;
        }
        #contador-container img {
          max-width: 120px !important;
        }
        #especial-container h1 {
          font-size: 2.2em !important;
          margin-top: 32px !important;
        }
        #especial-container > div {
          font-size: 1em !important;
        }
      }
      h1 {
        color: #fff;
        margin-top: 40px;
        font-size: 2.5em;
        text-shadow: 0 2px 8px #b1b270;
      }
      .progress-container {
        margin: 40px 0;
        width: 90%;
        max-width: 500px;
        background: #fff;
        border-radius: 30px;
        box-shadow: 0 4px 16px rgba(182, 194, 255, 0.3);
        padding: 30px;
        text-align: center;
      }
      .progress-bar {
        width: 100%;
        height: 30px;
        background: #719dcf;
        border-radius: 15px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .progress {
        height: 100%;
        background: linear-gradient(90deg, #193994 0%, #559cdf 100%);
        border-radius: 15px;
        transition: width 1s;
      }
      .days {
        font-size: 1.2em;
        margin-bottom: 10px;
      }
      .love {
        font-size: 1.5em;
        margin-top: 20px;
        color: #719dcf;
        text-shadow: 0 2px 8px #fff;
      }
      .heart {
        font-size: 3em;
        animation: pulse 1.2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }
      .sand-footer {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        height: auto;
        max-width: none;
        pointer-events: none;
        z-index: 1;
      }
      .apple-player {
        margin-top: 16px;
        width: min(92vw, 460px);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px;
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.34),
          rgba(255, 255, 255, 0.12)
        );
        box-shadow:
          0 24px 40px rgba(6, 20, 68, 0.35),
          inset 0 1px 1px rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .apple-cover-wrap {
        width: 92px;
        height: 92px;
        border-radius: 20px;
        overflow: hidden;
        flex-shrink: 0;
        box-shadow: 0 10px 24px rgba(6, 20, 68, 0.38);
      }
      .apple-cover {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .apple-track-area {
        min-width: 0;
        flex: 1;
      }
      .apple-track-title {
        color: #fff;
        font-size: 1.02em;
        font-weight: 700;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }
      .apple-track-artist {
        margin-top: 2px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.88em;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }
      .apple-seek {
        width: 100%;
        margin-top: 10px;
        appearance: none;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
        outline: none;
      }
      .apple-seek::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(6, 20, 68, 0.45);
        border: none;
      }
      .apple-seek::-moz-range-thumb {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 8px rgba(6, 20, 68, 0.45);
        border: none;
      }
      .apple-time {
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.76em;
      }
      .apple-controls {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        gap: 12px;
      }
      .apple-btn {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.23);
        color: #fff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        transition:
          transform 0.16s ease,
          background 0.2s ease;
      }
      .apple-btn:hover {
        background: rgba(255, 255, 255, 0.33);
      }
      .apple-btn:active {
        transform: scale(0.96);
      }
      .apple-btn-main {
        width: 44px;
        height: 44px;
        background: #fff;
        color: #193994;
        font-size: 15px;
        box-shadow: 0 8px 18px rgba(6, 20, 68, 0.32);
      }
      .apple-btn-main:hover {
        background: #f6f7ff;
      }
      @media (max-width: 600px) {
        .apple-player {
          width: min(94vw, 420px);
          padding: 12px;
          gap: 10px;
          border-radius: 22px;
        }
        .apple-cover-wrap {
          width: 74px;
          height: 74px;
          border-radius: 16px;
        }
        .apple-btn {
          width: 34px;
          height: 34px;
        }
        .apple-btn-main {
          width: 40px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <audio id="romantic-audio" preload="metadata"></audio>
    <canvas
      id="heart-canvas"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 9999;
        background: transparent;
        display: none;
      "
    ></canvas>
    <div id="contador-container" style="margin-top: 40px">
      <div style="display: flex; flex-direction: column; align-items: center">
        <h1>À espera do nosso show</h1>
        <div class="apple-player" aria-label="Player de música">
          <div class="apple-cover-wrap">
            <img
              src="../assets/love.jpeg"
              alt="Capa do player"
              class="apple-cover"
            />
          </div>
          <div class="apple-track-area">
            <div id="player-track-title" class="apple-track-title">
              Lua Cheia
            </div>
            <div id="player-track-artist" class="apple-track-artist">
              Marina Sena
            </div>
            <input
              id="player-seek"
              class="apple-seek"
              type="range"
              min="0"
              max="1000"
              value="0"
              step="1"
              aria-label="Progresso da música"
            />
            <div class="apple-time">
              <span id="player-current-time">0:00</span>
              <span id="player-duration">0:00</span>
            </div>
            <div class="apple-controls">
              <button
                id="player-prev"
                type="button"
                class="apple-btn"
                aria-label="Voltar música"
              >
                &#9198;
              </button>
              <button
                id="player-toggle"
                type="button"
                class="apple-btn apple-btn-main"
                aria-label="Play"
              >
                &#9654;
              </button>
              <button
                id="player-next"
                type="button"
                class="apple-btn"
                aria-label="Avançar música"
              >
                &#9197;
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="progress-container">
        <div class="days" id="days"></div>
        <div
          class="progress-bar"
          style="position: relative; background: #e1efff"
        >
          <div
            class="progress"
            id="progress"
            style="background: linear-gradient(90deg, #193994 0%, #559cdf 100%)"
          ></div>
          <span id="heart-indicator"></span>
        </div>
      </div>
    </div>
    <div
      id="especial-container"
      style="
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100vw;
      "
    >
      <h1
        style="
          font-size: 5em;
          color: #d72660;
          margin-top: 120px;
          text-shadow:
            0 4px 32px #fff,
            0 2px 8px #559cdf;
          font-weight: bold;
          letter-spacing: 0.08em;
          text-align: center;
        "
      >
        Chegou o nosso capítulo favorito
      </h1>
      <img
        src="../assets/comemorar.gif"
        alt="Abraço comemorativo"
        style="
          max-width: 420px;
          width: 90%;
          border-radius: 24px;
          margin-top: 36px;
          box-shadow: 0 4px 16px rgba(255, 182, 193, 0.25);
        "
      />
      <div
        style="
          font-size: 2em;
          color: #a8325c;
          margin-top: 32px;
          text-align: center;
          max-width: 700px;
          text-shadow: 0 2px 8px #fff;
        "
      >
        O dia tão esperado chegou, e entre as névoas, encontrei a doçura da tua
        alma, sendo mais rara que uma flor de pitaya. 🌙
      </div>
    </div>
    <img
      src="../assets/sand.svg"
      alt=""
      aria-hidden="true"
      class="sand-footer"
    />
    <script>
      // Contador e efeito especial
      function mostrarEspecial() {
        document.getElementById('contador-container').style.display = 'none';
        document.getElementById('especial-container').style.display = 'flex';
        document.getElementById('heart-canvas').style.display = 'block';
        iniciarEfeitoEspecial();
      }

      function formatMusicTime(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
        const totalSeconds = Math.floor(seconds);
        const minutes = Math.floor(totalSeconds / 60);
        const remainingSeconds = String(totalSeconds % 60).padStart(2, '0');
        return `${minutes}:${remainingSeconds}`;
      }

      function initRomanticPlayer() {
        const audio = document.getElementById('romantic-audio');
        const prevButton = document.getElementById('player-prev');
        const toggleButton = document.getElementById('player-toggle');
        const nextButton = document.getElementById('player-next');
        const seek = document.getElementById('player-seek');
        const title = document.getElementById('player-track-title');
        const artist = document.getElementById('player-track-artist');
        const currentTime = document.getElementById('player-current-time');
        const duration = document.getElementById('player-duration');

        if (
          !audio ||
          !prevButton ||
          !toggleButton ||
          !nextButton ||
          !seek ||
          !title ||
          !artist ||
          !currentTime ||
          !duration
        ) {
          return;
        }

        const playlist = [
          {
            src: '../assets/music/00 Lua Cheia.mp3',
            title: 'Lua Cheia',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/01 Coisas Naturais.mp3',
            title: 'Coisas Naturais',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/02 Desmitificar.mp3',
            title: 'Desmitificar',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/03 Numa Ilha.mp3',
            title: 'Numa Ilha',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/04 Anjo.mp3',
            title: 'Anjo',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/05 Sem Lei.mp3',
            title: 'Sem Lei',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/06 Combo da Sorte.mp3',
            title: 'Combo da Sorte',
            artist: 'Marina Sena',
          },
          {
            src: '../assets/music/07 Mágico.mp3',
            title: 'Mágico',
            artist: 'Marina Sena',
          },
        ];

        let currentTrackIndex = 0;
        let isSeeking = false;

        function updatePlayButton() {
          if (audio.paused) {
            toggleButton.textContent = '▶';
            toggleButton.setAttribute('aria-label', 'Play');
            return;
          }
          toggleButton.textContent = '❚❚';
          toggleButton.setAttribute('aria-label', 'Pausar');
        }

        function updateTrackText() {
          const track = playlist[currentTrackIndex];
          title.textContent = track.title;
          artist.textContent = track.artist;
        }

        function updateProgressUI() {
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (hasDuration && !isSeeking) {
            seek.value = String(
              Math.round((audio.currentTime / audio.duration) * 1000),
            );
          }
          currentTime.textContent = formatMusicTime(audio.currentTime);
          duration.textContent = hasDuration
            ? formatMusicTime(audio.duration)
            : '0:00';
        }

        function loadTrack(index, autoPlay = false) {
          currentTrackIndex = (index + playlist.length) % playlist.length;
          audio.src = encodeURI(playlist[currentTrackIndex].src);
          audio.load();
          seek.value = '0';
          currentTime.textContent = '0:00';
          duration.textContent = '0:00';
          updateTrackText();

          if (autoPlay) {
            audio.play().catch(() => {
              updatePlayButton();
            });
          } else {
            updatePlayButton();
          }
        }

        prevButton.addEventListener('click', () => {
          loadTrack(currentTrackIndex - 1, !audio.paused);
        });

        nextButton.addEventListener('click', () => {
          loadTrack(currentTrackIndex + 1, !audio.paused);
        });

        toggleButton.addEventListener('click', () => {
          if (audio.paused) {
            audio.play().catch(() => {
              updatePlayButton();
            });
            return;
          }
          audio.pause();
        });

        seek.addEventListener('input', () => {
          isSeeking = true;
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (!hasDuration) return;
          const nextTime = (Number(seek.value) / 1000) * audio.duration;
          currentTime.textContent = formatMusicTime(nextTime);
        });

        seek.addEventListener('change', () => {
          const hasDuration =
            Number.isFinite(audio.duration) && audio.duration > 0;
          if (hasDuration) {
            audio.currentTime = (Number(seek.value) / 1000) * audio.duration;
          }
          isSeeking = false;
        });

        audio.addEventListener('loadedmetadata', updateProgressUI);
        audio.addEventListener('timeupdate', updateProgressUI);
        audio.addEventListener('play', updatePlayButton);
        audio.addEventListener('pause', updatePlayButton);
        audio.addEventListener('ended', () => {
          loadTrack(currentTrackIndex + 1, true);
        });

        loadTrack(0);

        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            document.body.addEventListener(
              'click',
              () => {
                audio.play().catch(() => {});
              },
              { once: true },
            );
          });
        }
      }

      // Contador antigo
      function atualizarContador() {
        const hoje = new Date();
        const encontro = new Date('2026-04-17T00:00:00');
        const inicio = new Date('2026-03-17T00:00:00');
        const diasTotais = Math.ceil(
          (encontro - inicio) / (1000 * 60 * 60 * 24),
        );
        const diasRestantes = Math.max(
          0,
          Math.ceil((encontro - hoje) / (1000 * 60 * 60 * 24)),
        );
        const progresso = 100 - (diasRestantes / diasTotais) * 100;
        document.getElementById('days').innerHTML =
          diasRestantes === 0
            ? 'Hoje é o grande dia, como o clímax do nosso romance! 🌙'
            : `Faltam apenas <b>${diasRestantes}</b> dias para estar ouvindo Marina Sena com a melhor namorada do mundo.`;
        document.getElementById('progress').style.width = progresso + '%';
        // Indicador de coração na barra
        const barra = document.querySelector('.progress-bar');
        const heart = document.getElementById('heart-indicator');
        heart.style.position = 'absolute';
        heart.style.top = '50%';
        heart.style.transform = 'translateY(-50%)';
        heart.style.width = '32px';
        heart.style.height = '32px';
        heart.style.background = '#fff';
        heart.style.borderRadius = '50%';
        heart.style.display = 'flex';
        heart.style.alignItems = 'center';
        heart.style.justifyContent = 'center';
        heart.style.boxShadow = '0 2px 8px rgba(255,182,193,0.2)';
        heart.style.fontSize = '1.2em';
        heart.style.transition = 'left 1s, background 0.3s';
        heart.innerHTML = '🌙';
        heart.style.left = `calc(${progresso}% - 16px)`;
        // Se chegou o dia, mostra especial
        if (diasRestantes === 0) mostrarEspecial();
      }
      atualizarContador();

      // Chuva de corações na tela de contagem
      function iniciarChuvaContador() {
        const canvas = document.getElementById('heart-canvas');
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        let rainHearts = [];
        const MAX_RAIN = 40;
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function createRainHeart() {
          if (rainHearts.length >= MAX_RAIN) return;
          const size = Math.random() * 18 + 12;
          rainHearts.push({
            x: Math.random() * canvas.width,
            y: -size,
            size,
            vy: Math.random() * 2.5 + 1.5,
            opacity: Math.random() * 0.5 + 0.5,
            rotation: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.04,
          });
        }
        function drawHeart(x, y, size, rotation, opacity) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rotation);
          ctx.globalAlpha = opacity;
          const outerRadius = size * 0.65;
          const centerY = size * 0.35;
          ctx.fillStyle = '#cdcf51';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(0, centerY, outerRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'destination-out';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(size * 0.35, centerY, outerRadius * 0.9, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
          ctx.restore();
        }
        function animateHearts() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < rainHearts.length; i++) {
            const r = rainHearts[i];
            r.y += r.vy;
            r.rotation += r.spin;
            drawHeart(r.x, r.y, r.size, r.rotation, r.opacity);
          }
          rainHearts = rainHearts.filter((r) => r.y < canvas.height + r.size);
          requestAnimationFrame(animateHearts);
        }
        setInterval(createRainHeart, 120);
        animateHearts();
      }
      // Inicia a chuva de corações na tela de contagem
      iniciarChuvaContador();
      // Efeito especial (explosão e chuva)
      function iniciarEfeitoEspecial() {
        const canvas = document.getElementById('heart-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let hearts = [];
        let rainHearts = [];
        const MAX_HEARTS = 120;
        const MAX_RAIN = 40;
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function createExplosion() {
          if (hearts.length > MAX_HEARTS) return;
          const numExplosions = Math.floor(Math.random() * 2) + 1;
          for (let e = 0; e < numExplosions; e++) {
            const centerX = Math.random() * canvas.width;
            const centerY = Math.random() * canvas.height;
            const numHearts = 16 + Math.floor(Math.random() * 8);
            for (let i = 0; i < numHearts; i++) {
              const angle = (Math.PI * 2 * i) / numHearts;
              const speed = Math.random() * 5 + 5;
              const size = Math.random() * 16 + 12;
              hearts.push({
                x: centerX,
                y: centerY,
                size,
                speed,
                angle,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                opacity: 1,
                spin: (Math.random() - 0.5) * 0.06,
                rotation: Math.random() * Math.PI * 2,
              });
            }
          }
        }
        function createRainHeart() {
          if (rainHearts.length >= MAX_RAIN) return;
          const size = Math.random() * 18 + 12;
          rainHearts.push({
            x: Math.random() * canvas.width,
            y: -size,
            size,
            vy: Math.random() * 2.5 + 1.5,
            opacity: Math.random() * 0.5 + 0.5,
            rotation: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.04,
          });
        }
        function drawHeart(x, y, size, rotation, opacity) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rotation);
          ctx.globalAlpha = opacity;
          const outerRadius = size * 0.65;
          const centerY = size * 0.35;
          ctx.fillStyle = '#193994';
          ctx.shadowColor = '#559cdf';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(0, centerY, outerRadius, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'destination-out';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(size * 0.35, centerY, outerRadius * 0.9, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalCompositeOperation = 'source-over';
          ctx.restore();
        }
        function animateHearts() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          // Explosões
          if (hearts.length > 0) {
            for (let i = 0; i < hearts.length; i++) {
              const h = hearts[i];
              h.x += h.vx;
              h.y += h.vy;
              h.rotation += h.spin;
              h.opacity -= 0.018;
              if (h.opacity < 0.08) h.opacity = 0;
              drawHeart(h.x, h.y, h.size, h.rotation, h.opacity);
            }
            hearts = hearts.filter((h) => h.opacity > 0);
          }
          // Chuva de corações (pétalas)
          for (let i = 0; i < rainHearts.length; i++) {
            const r = rainHearts[i];
            r.y += r.vy;
            r.rotation += r.spin;
            drawHeart(r.x, r.y, r.size, r.rotation, r.opacity);
          }
          rainHearts = rainHearts.filter((r) => r.y < canvas.height + r.size);
          requestAnimationFrame(animateHearts);
        }
        setInterval(createExplosion, 2000);
        setInterval(createRainHeart, 120);
        createExplosion();
        animateHearts();
      }
      // Só inicia o efeito especial quando mostrarEspecial for chamado
      document
        .getElementById('especial-container')
        .addEventListener('transitionend', iniciarEfeitoEspecial);
      // Para garantir, também inicia ao mostrar
      document
        .getElementById('especial-container')
        .addEventListener('display', iniciarEfeitoEspecial);
      window.addEventListener('DOMContentLoaded', () => {
        initRomanticPlayer();
      });
    </script>
  </body>
</html>
